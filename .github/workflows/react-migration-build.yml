name: React Build Check

on:
  push:
    paths:
      - 'react-migration/**'
      - '.github/workflows/react-migration-build.yml'
  pull_request:
    paths:
      - 'react-migration/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-migration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-migration/package.json
      - run: npm install
      - run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: react-migration/dist/
          retention-days: 7
