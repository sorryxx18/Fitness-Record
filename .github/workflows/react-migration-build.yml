name: React Migration Build

on:
  push:
    paths:
      - 'react-migration/**'
      - '.github/workflows/react-migration-build.yml'
  pull_request:
    paths:
      - 'react-migration/**'
      - '.github/workflows/react-migration-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-migration
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-migration/package.json
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
